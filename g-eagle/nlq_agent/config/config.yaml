llm:
  provider: ollama            # openai | anthropic | gemini | ollama
  model: gemma4:latest
  temperature: 0.0
  base_url: http://localhost:11434   # only used by ollama

database:
  provider: local_postgres    # athena | local_postgres
  athena:
    region: us-east-1
    s3_output: s3://your-bucket/athena-results/
    database: your_db
  local_postgres:
    host: localhost
    port: 5432
    database: nlq_demo
    user: nlq_user
    password: nlq_pass

discovery:
  sources:
    # - glue
    # - pinecone
    # - datahub
    - flatfile
  top_k: 5                  # Top K tables to return

retry:
  max_attempts: 3           # Configurable N

pinecone:
  index_name: schema-metadata
  embedding_model: text-embedding-3-small

memory:
  short_term: true
  long_term: true
  long_term_store: sqlite   # sqlite | dynamodb
  semantic: false           # disabled for local e2e to avoid Pinecone requirement

human_fallback:
  enabled: true
  confidence_threshold: 0.4  # Below this → ask human
